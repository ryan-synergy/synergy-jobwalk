<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Job Walk">
  <title>Synergy — Job Walk</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --ink:      #0e1117;
      --ink-2:    #1c2333;
      --ink-3:    #374151;
      --ink-4:    #6b7280;
      --ink-5:    #9ca3af;
      --line:     #e5e7eb;
      --line-2:   #f3f4f6;
      --bg:       #f2f3f6;
      --surface:  #ffffff;
      --brand:    #d9551a;
      --brand-lt: #fef3ee;
      --green:    #16a34a;
      --blue:     #1d4ed8;
      --danger:   #dc2626;
      --r:        10px;
      --safe-t:   env(safe-area-inset-top, 0px);
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    #app { max-width: 640px; margin: 0 auto; min-height: 100dvh; }

    /* ─── HEADER ─── */
    .hdr {
      background: var(--ink);
      padding: 13px 18px;
      padding-top: calc(13px + var(--safe-t));
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 300;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .hdr-title { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -.01em; }
    .hdr-btn {
      background: none; border: none; color: var(--brand);
      font-size: 14px; font-weight: 600; cursor: pointer;
      padding: 9px; margin: -9px; font-family: inherit; letter-spacing: -.01em;
    }
    .hdr-spacer { width: 60px; }

    /* ─── BOTTOM NAV ─── */
    .bnav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 640px;
      background: var(--surface);
      border-top: 1px solid var(--line);
      display: flex;
      padding-bottom: var(--safe-b);
      z-index: 300;
    }
    .bnav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 9px 4px 7px; border: none; background: none;
      color: var(--ink-5); font-size: 9.5px; font-weight: 600;
      letter-spacing: .03em; text-transform: uppercase;
      gap: 4px; cursor: pointer; font-family: inherit;
      transition: color .15s;
    }
    .bnav-tab.on { color: var(--brand); }
    .bnav-tab svg { width: 20px; height: 20px; }

    /* ─── CONTENT ─── */
    .content {
      padding: 14px;
      padding-bottom: calc(62px + var(--safe-b) + 14px);
    }

    /* ─── CARDS ─── */
    .card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--line);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card-hd {
      padding: 13px 16px 0;
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--ink-4);
    }
    .card-body { padding: 14px 16px 16px; }
    .card-body.no-top { padding-top: 10px; }

    /* ─── FIELDS ─── */
    .f { margin-bottom: 18px; }
    .f:last-child { margin-bottom: 0; }
    .f > label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--ink-3); margin-bottom: 8px; letter-spacing: -.01em;
    }
    input[type=text], input[type=number], textarea {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-size: 15px; font-family: inherit;
      color: var(--ink); background: var(--surface);
      -webkit-appearance: none;
      transition: border-color .15s;
      line-height: 1.4;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--ink-3); }
    textarea { resize: none; height: 78px; }
    .row2 { display: flex; gap: 8px; }
    .row2 input { flex: 1; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ─── CHIPS ─── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 7px 13px;
      border-radius: 6px;
      border: 1.5px solid var(--line);
      background: var(--surface);
      font-size: 13.5px; font-weight: 500;
      color: var(--ink-3);
      cursor: pointer; font-family: inherit;
      transition: all .12s; white-space: nowrap; line-height: 1;
    }
    .chip.on {
      background: var(--ink); border-color: var(--ink);
      color: #fff; font-weight: 600;
    }

    /* ─── COUNTER ─── */
    .ctr {
      display: inline-flex; align-items: stretch;
      border: 1.5px solid var(--line); border-radius: 8px;
      overflow: hidden; background: var(--surface);
    }
    .ctr-btn {
      width: 44px; border: none; background: var(--line-2);
      font-size: 20px; font-weight: 400; color: var(--ink-3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .1s; user-select: none;
    }
    .ctr-btn:active { background: var(--line); }
    .ctr input {
      width: 54px; text-align: center;
      border: none !important;
      border-left: 1.5px solid var(--line) !important;
      border-right: 1.5px solid var(--line) !important;
      border-radius: 0 !important;
      font-size: 17px; font-weight: 700;
      color: var(--ink); padding: 9px 0;
    }
    .ctr input:focus { border-color: var(--line) !important; }

    /* ─── TOGGLE ─── */
    .tog-row {
      display: flex; align-items: center;
      justify-content: space-between; min-height: 42px;
    }
    .tog-lbl { font-size: 15px; font-weight: 500; color: var(--ink); }
    .tog {
      width: 46px; height: 26px;
      background: #d1d5db; border-radius: 13px;
      position: relative; cursor: pointer; border: none;
      transition: background .2s; flex-shrink: 0;
    }
    .tog.on { background: var(--ink); }
    .tog::after {
      content: ''; width: 20px; height: 20px;
      background: #fff; border-radius: 50%;
      position: absolute; top: 3px; left: 3px;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .tog.on::after { transform: translateX(20px); }

    /* ─── DIVIDER ─── */
    .div { height: 1px; background: var(--line); margin: 2px 0; }

    /* ─── ROOM LIST ─── */
    .room-row {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r); padding: 13px 14px;
      margin-bottom: 8px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer;
      transition: border-color .12s;
    }
    .room-row:active { border-color: var(--ink-3); }
    .room-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
    .room-sub { font-size: 12.5px; color: var(--ink-4); margin-top: 3px; }
    .room-row-right { display: flex; align-items: center; gap: 4px; }
    .room-del {
      background: none; border: none; color: #d1d5db;
      font-size: 16px; cursor: pointer; padding: 8px; margin: -8px;
      transition: color .15s;
    }
    .room-del:hover, .room-del:active { color: var(--danger); }
    .room-chev { color: var(--ink-5); font-size: 18px; font-weight: 300; margin-left: 6px; }

    /* ─── ADD ROOM BUTTON ─── */
    .add-btn {
      width: 100%; padding: 14px;
      border: 1.5px dashed var(--line);
      border-radius: var(--r);
      background: transparent;
      color: var(--ink-4); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      letter-spacing: -.01em; transition: all .15s; margin-top: 4px;
    }
    .add-btn:hover { border-color: var(--ink-3); color: var(--ink-3); }
    .add-btn:active { background: var(--line-2); }

    /* ─── HOME ─── */
    .home-top {
      background: var(--ink);
      padding: 40px 22px 30px;
      padding-top: calc(40px + var(--safe-t));
    }
    .home-mark {
      display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
    }
    .home-s {
      width: 36px; height: 36px;
      background: var(--brand); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.03em;
      flex-shrink: 0;
    }
    .home-wordmark { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.02em; }
    .home-sub { font-size: 13px; color: #6b7280; margin-top: 2px; letter-spacing: -.01em; }
    .home-date { font-size: 12px; color: #4b5563; margin-top: 14px; text-transform: uppercase; letter-spacing: .06em; }
    .home-content { padding: 18px 14px; }

    .new-btn {
      width: 100%; padding: 15px;
      background: var(--brand); color: #fff;
      border: none; border-radius: var(--r);
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      letter-spacing: -.01em; margin-bottom: 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .new-btn:active { opacity: .9; }

    .sec-lbl {
      font-size: 10.5px; font-weight: 700; color: var(--ink-4);
      text-transform: uppercase; letter-spacing: .07em;
      padding: 0 2px 10px;
    }

    .job-row {
      background: var(--surface); border-radius: var(--r);
      padding: 14px 16px; margin-bottom: 8px;
      border: 1px solid var(--line); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color .12s;
    }
    .job-row:active { border-color: var(--ink-3); }
    .job-name { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
    .job-meta { font-size: 12.5px; color: var(--ink-4); margin-top: 3px; }
    .job-del {
      background: none; border: none; color: #d1d5db;
      font-size: 17px; cursor: pointer; padding: 8px; margin: -8px;
      transition: color .15s;
    }
    .job-del:hover { color: var(--danger); }

    /* ─── ROOM PICKER ─── */
    .pick-list { padding: 0 16px; }
    .pick-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; cursor: pointer;
      border-bottom: 1px solid var(--line);
      transition: opacity .1s;
    }
    .pick-row:last-child { border-bottom: none; }
    .pick-row:active { opacity: .6; }
    .pick-name { font-size: 15px; font-weight: 500; color: var(--ink); }
    .pick-name.custom { color: var(--brand); font-weight: 600; }
    .pick-chev { color: var(--line); font-size: 18px; }
    .pick-group {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--ink-5);
      padding: 16px 16px 6px; background: var(--line-2);
      border-top: 1px solid var(--line);
    }
    .pick-group:first-child { border-top: none; }

    /* ─── EXPORT STATS ─── */
    .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .stat-box { background: var(--line-2); border-radius: 8px; padding: 13px 10px; text-align: center; border: 1px solid var(--line); }
    .stat-n { font-size: 26px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -.02em; }
    .stat-l { font-size: 10.5px; color: var(--ink-4); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }

    .exp-btn {
      width: 100%; padding: 14px; border-radius: var(--r);
      font-size: 15px; font-weight: 700; border: none;
      cursor: pointer; font-family: inherit; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      letter-spacing: -.01em;
    }
    .exp-xl { background: var(--green); color: #fff; }
    .exp-js { background: var(--blue); color: #fff; }
    .exp-btn:active { opacity: .9; }

    /* ─── EMPTY ─── */
    .empty { text-align: center; padding: 52px 24px; }
    .empty-line { width: 32px; height: 2px; background: var(--line); margin: 0 auto 16px; }
    .empty-tx { font-size: 14px; color: var(--ink-5); }

    /* ─── DELETE ─── */
    .del-row { display: flex; justify-content: center; padding: 8px 0 12px; }
    .del-lnk {
      background: none; border: none; color: var(--danger);
      font-size: 13.5px; cursor: pointer; padding: 8px 16px;
      font-family: inherit; font-weight: 500;
    }

    /* ─── SCREEN ANIM ─── */
    .screen { animation: fi .16s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── BADGE ─── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-orange { background: var(--brand-lt); color: var(--brand); }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── SVG ICONS ───
const IC = {
  client: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>`,
  rooms:  `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>`,
  systems:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="2.2" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="2.2" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="2.2" fill="currentColor" stroke="none"/></svg>`,
  network:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5C6.8 10.4 9.3 9.2 12 9.2s5.2 1.2 7 3.3"/><path d="M1.5 8.8C4.5 5.5 8.1 3.5 12 3.5s7.5 2 10.5 5.3"/><path d="M8.5 16.2c.9-1.1 2.1-1.8 3.5-1.8s2.6.7 3.5 1.8"/><circle cx="12" cy="20.5" r="1.5" fill="currentColor" stroke="none"/></svg>`,
  cameras:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
  export: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  plus:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  arrow:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  upload: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
};

// ─── STATE & STORAGE ───
const SK = 'syng_jw_v2';
let S = { screen:'home', tab:'client', jobs:[], jid:null, rid:null, room:null };

function persist() { localStorage.setItem(SK, JSON.stringify({ jobs:S.jobs, jid:S.jid })); }
function hydrate() {
  try { const d=JSON.parse(localStorage.getItem(SK)||'{}'); if(d.jobs) S.jobs=d.jobs; if(d.jid) S.jid=d.jid; } catch(e){}
}
function uid() { return crypto.randomUUID?.() || Math.random().toString(36).slice(2)+Date.now().toString(36); }
function job() { return S.jobs.find(j=>j.id===S.jid); }

function mkJob() {
  return {
    id:uid(), createdAt:new Date().toISOString(),
    client:{ name:'',address:'',decisionMaker:'',gcName:'',designer:'',jobType:'',phase:'',budgetTier:'' },
    home:{ sqft:'',stories:'',construction:'' },
    setup:{ rackLocation:'',networkCloset:'',notes:'' },
    rooms:[],
    control:{ processor:'',subsystems:[] },
    lighting:{ brand:'',scope:'' },
    audio:{ platform:'',zones:0 },
    network:{ apCount:0,switchSize:'',nvr:false,ups:false,notes:'' },
    cameras:{ total:0,interior:0,exterior:0,areas:[],notes:'' },
    outdoor:{ landscapeAudio:false,zones:0,poolSpa:false,outdoorTv:false }
  };
}
function mkRoom(name, custom) {
  return {
    id:uid(), name, customName:custom||'',
    avType:'',
    tv:{ size:'',customSize:'',wallW:'',wallH:'',mountType:'' },
    audio:{ type:'',surroundConfig:'' },
    theater:{ displayType:'',screenType:'',blackoutShades:null },
    gearLocation:'', sourceDevice:'',
    c4Remote:null, lightingKeypad:null, motorizedShades:'',
    ceilingHeight:'', dataDrops:null, notes:''
  };
}

// ─── NAVIGATION ───
function go(screen, tab) { S.screen=screen; if(tab) S.tab=tab; render(); window.scrollTo(0,0); }
function tab(t) { S.tab=t; render(); window.scrollTo(0,0); }

// ─── DATA HELPERS ───
function setPath(obj,path,val) { const p=path.split('.'); let o=obj; for(let i=0;i<p.length-1;i++) o=o[p[i]]; o[p[p.length-1]]=val; }
function getPath(obj,path) { return path.split('.').reduce((o,k)=>o?.[k],obj); }

// ─── JOB HANDLERS ───
function jInput(el,path) { setPath(job(),path,el.value); persist(); }
function jChip(el,path,multi) {
  const v=el.dataset.value,j=job(),cur=getPath(j,path);
  if(multi) { const a=cur||[]; a.includes(v)?a.splice(a.indexOf(v),1):a.push(v); setPath(j,path,a); }
  else { setPath(j,path,cur===v?'':v); }
  const nv=getPath(j,path);
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',multi?(nv||[]).includes(c.dataset.value):nv===c.dataset.value));
  persist();
  if(path==='outdoor.landscapeAudio') render();
}
function jToggle(el,path) { el.classList.toggle('on'); setPath(job(),path,el.classList.contains('on')); persist(); if(path.startsWith('outdoor.')) render(); }
function jCtr(el,path,d) { const j=job(),nv=Math.max(0,(getPath(j,path)||0)+d); setPath(j,path,nv); const inp=d>0?el.previousElementSibling:el.nextElementSibling; if(inp?.tagName==='INPUT') inp.value=nv; persist(); }
function jCtrSet(el,path) { setPath(job(),path,Math.max(0,parseInt(el.value)||0)); persist(); }

// ─── ROOM HANDLERS ───
function rInput(el,path) { setPath(S.room,path,el.value); }
function rChip(el,path,multi) {
  const v=el.dataset.value,r=S.room,cur=getPath(r,path);
  if(multi) { const a=cur||[]; a.includes(v)?a.splice(a.indexOf(v),1):a.push(v); setPath(r,path,a); }
  else { setPath(r,path,cur===v?'':v); }
  const nv=getPath(r,path);
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',multi?(nv||[]).includes(c.dataset.value):nv===c.dataset.value));
  if(path==='avType') { r.tv.present=['tv_only','tv_stereo','tv_surround'].includes(v); render(); }
}
function rBool(el,field) { const v=el.dataset.value==='true'; S.room[field]=v; el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.value===String(v))); }
function rToggle(el,path) { el.classList.toggle('on'); setPath(S.room,path,el.classList.contains('on')); }

// ─── RENDER HELPERS ───
function jChips(opts,path,multi=false) {
  const val=getPath(job(),path);
  return `<div class="chips">${opts.map(o=>`<button class="chip ${multi?(val||[]).includes(o.v)?'on':'':val===o.v?'on':''}" data-value="${o.v}" onclick="jChip(this,'${path}',${multi})">${o.l}</button>`).join('')}</div>`;
}
function rChips(opts,path,multi=false) {
  const val=getPath(S.room,path);
  return `<div class="chips">${opts.map(o=>`<button class="chip ${multi?(val||[]).includes(o.v)?'on':'':val===o.v?'on':''}" data-value="${o.v}" onclick="rChip(this,'${path}',${multi})">${o.l}</button>`).join('')}</div>`;
}
function rBoolChips(field) {
  const v=S.room[field];
  return `<div class="chips">
    <button class="chip ${v===true?'on':''}" data-value="true" onclick="rBool(this,'${field}')">Yes</button>
    <button class="chip ${v===false?'on':''}" data-value="false" onclick="rBool(this,'${field}')">No</button>
  </div>`;
}
function jCtrEl(path) {
  const v=getPath(job(),path)||0;
  return `<div class="ctr"><button class="ctr-btn" onclick="jCtr(this,'${path}',-1)">−</button><input type="number" value="${v}" min="0" onchange="jCtrSet(this,'${path}')" oninput="jCtrSet(this,'${path}')"><button class="ctr-btn" onclick="jCtr(this,'${path}',1)">+</button></div>`;
}
function jTogEl(path,label) {
  const v=getPath(job(),path);
  return `<div class="tog-row"><span class="tog-lbl">${label}</span><button class="tog ${v?'on':''}" onclick="jToggle(this,'${path}')"></button></div>`;
}
function field(label, body) { return `<div class="f"><label>${label}</label>${body}</div>`; }

const TABS=[

  {id:'rooms',   ic:'rooms',   lbl:'Rooms'},

// ─── ROOMS TAB ───
function roomSub(r) {
  const lbl={tv_only:'TV Only',speakers_only:'Speakers Only',tv_stereo:'TV + Stereo',tv_surround:'TV + Surround',audio_only:'Audio Only',none:'None'};
  const p=[];
  if(r.avType) p.push(lbl[r.avType]||r.avType);
  if(r.tv?.size) p.push(r.tv.size==='other'?(r.tv.customSize||'Custom size'):r.tv.size+'"');
  if(r.gearLocation) p.push(r.gearLocation==='rack'?'Distributed to rack':'Local');
  return p.join('  ·  ')||'Not configured';
}
function renderRooms(j) {
  return `
  ${j.rooms.length===0
    ? `<div class="empty"><div class="empty-line"></div><div class="empty-tx">No rooms added yet.</div></div>`

        <div class="room-row" onclick="editRoom('${r.id}')">
          <div>

            <div class="room-sub">${roomSub(r)}</div>

          <div class="room-row-right">
            <button class="room-del" onclick="event.stopPropagation();delRoom('${r.id}')">×</button>

        </div>`).join('')
  }
  <button class="add-btn" onclick="go('picker')">${IC.plus} Add Room</button>`;
}

function editRoom(id) { S.rid=id; S.room=JSON.parse(JSON.stringify(job().rooms.find(r=>r.id===id))); go('room-editor'); }

function pickRoom(name) {
  let custom='';
  if(name==='Custom') { custom=prompt('Room name:'); if(!custom) return; }
  else if(name==='Bedroom') { custom=prompt('Name this bedroom (e.g. "Guest Room", "Bedroom 2"):') || 'Bedroom'; }
  const r=mkRoom(name,custom); job().rooms.push(r); persist();
  S.rid=r.id; S.room=JSON.parse(JSON.stringify(r)); go('room-editor');
}

        <div class="card-hd">Television</div>

          ${field('TV Size',`${rChips([{l:'55"',v:'55'},{l:'65"',v:'65'},{l:'75"',v:'75'},{l:'85"',v:'85'},{l:'98"',v:'98'},{l:'Other',v:'other'}],'tv.size')}${r.tv.size==='other'?`<input type="text" style="margin-top:8px" placeholder='e.g. 77"' value="${r.tv.customSize||''}" oninput="rInput(this,'tv.customSize')">`:''}`)}

          ${isTheater?`

            ${r.theater.displayType==='projector'?field('Screen Type',rChips([{l:'Fixed',v:'fixed'},{l:'Electric',v:'electric'},{l:'Short Throw',v:'short_throw'}],'theater.screenType')):''}`:''}
          ${field('Source Device',rChips([{l:'Apple TV',v:'appletv'},{l:'Client OFE',v:'ofe'},{l:'TBD',v:'tbd'},{l:'None',v:'none'}],'sourceDevice'))}
        </div>

        <div class="card-hd">Audio</div>
        <div class="card-body no-top">
          ${isSurround
            ? `${field('Surround Config',rChips([{l:'5.1',v:'5.1'},{l:'7.1',v:'7.1'},{l:'Dolby Atmos',v:'atmos'}],'audio.surroundConfig'))}

          ${field('Gear Location',rChips([{l:'Local (in room)',v:'local'},{l:'Distributed to AV Rack',v:'rack'}],'gearLocation'))}

      <div class="card">
        <div class="card-hd">Additional Details</div>
        <div class="card-body no-top">

function saveRoom() { const j=job(),i=j.rooms.findIndex(r=>r.id===S.rid); if(i>=0) j.rooms[i]=S.room; persist(); go('job','rooms'); }
function cancelRoom() { go('job','rooms'); }
function delThisRoom() { if(!confirm('Delete this room?')) return; job().rooms=job().rooms.filter(r=>r.id!==S.rid); persist(); go('job','rooms'); }

// ─── EXPORT ───
const AV_LBL={tv_only:'TV Only',speakers_only:'Speakers Only',tv_stereo:'TV + Stereo',tv_surround:'TV + Surround',audio_only:'Audio Only',none:'None'};
const PROC_LBL={core1:'CORE 1',ea1:'EA-1',ea3:'EA-3',ea5:'EA-5',tbd:'TBD'};

function exportXL() {
  const j=job(), wb=XLSX.utils.book_new();

  // Summary
  const sd=[
    ['SYNERGY JOB WALK',''],['',''],
    ['Client',j.client.name||''],['Address',j.client.address||''],
    ['Decision Maker',j.client.decisionMaker||''],['GC / Builder',j.client.gcName||''],
    ['Architect / Designer',j.client.designer||''],['',''],
    ['Project Type',j.client.jobType||''],['Phase',j.client.phase||''],
    ['Budget Tier',j.client.budgetTier||''],['',''],
    ['Sq Footage',j.home.sqft||''],['Stories',j.home.stories||''],
    ['Construction',j.home.construction||''],['',''],
    ['Rack Location',j.setup.rackLocation||''],['Network Closet',j.setup.networkCloset||''],['',''],
    ['TOTALS',''],
    ['Rooms',j.rooms.length],
    ['TV Zones',j.rooms.filter(r=>['tv_only','tv_stereo','tv_surround'].includes(r.avType)).length],
    ['Audio Zones',j.rooms.filter(r=>['speakers_only','tv_stereo','tv_surround','audio_only'].includes(r.avType)).length],
    ['Surround Rooms',j.rooms.filter(r=>r.avType==='tv_surround').length],
    ['C4 Remotes',j.rooms.filter(r=>r.c4Remote===true).length],
    ['Access Points',j.network.apCount||0],
    ['Cameras Total',j.cameras.total||0],
    ['Interior Cameras',j.cameras.interior||0],
    ['Exterior Cameras',j.cameras.exterior||0],['',''],
    ['C4 Processor',PROC_LBL[j.control.processor]||j.control.processor||''],
    ['Sub-Systems',(j.control.subsystems||[]).join(', ')],
    ['Lighting Brand',j.lighting.brand||''],['Lighting Scope',j.lighting.scope||''],
    ['Audio Platform',j.audio.platform||''],['Audio Zones',j.audio.zones||0],['',''],
    ['Walk Notes',j.setup.notes||''],
    ['Export Date',new Date().toLocaleDateString()],
  ];
  const ws1=XLSX.utils.aoa_to_sheet(sd); ws1['!cols']=[{wch:26},{wch:44}];
  XLSX.utils.book_append_sheet(wb,ws1,'Summary');

  // Rooms
  const rH=['Room','AV Type','TV Size','Wall W"','Wall H"','Mount','Speaker','Surround','Gear Location','Source','C4 Remote','Ltg Keypad','Shades','Ceiling Ht','Data Drops','Notes'];
  const rR=j.rooms.map(r=>[
    r.customName||r.name, AV_LBL[r.avType]||'',
    r.tv.size==='other'?(r.tv.customSize||'Custom'):(r.tv.size?r.tv.size+'"':''),
    r.tv.wallW||'', r.tv.wallH||'', r.tv.mountType||'',
    r.audio.type||'', r.audio.surroundConfig||'',
    r.gearLocation==='rack'?'To AV Rack':r.gearLocation||'',
    r.sourceDevice||'',
    r.c4Remote===true?'Yes':r.c4Remote===false?'No':'',
    r.lightingKeypad===true?'Yes':r.lightingKeypad===false?'No':'',
    r.motorizedShades||'',
    r.ceilingHeight?r.ceilingHeight+"'":'',
    r.dataDrops===true?'Yes':r.dataDrops===false?'No':'',
    r.notes||''
  ]);
  const ws2=XLSX.utils.aoa_to_sheet([rH,...rR]); ws2['!cols']=rH.map((_,i)=>({wch:i===15?42:15}));
  XLSX.utils.book_append_sheet(wb,ws2,'Rooms');

  // Systems
  const sys=[
    ['CONTROL4',''],['Processor',PROC_LBL[j.control.processor]||j.control.processor||''],
    ['Sub-Systems',(j.control.subsystems||[]).join(', ')],['',''],
    ['LIGHTING',''],['Brand',j.lighting.brand||''],['Scope',j.lighting.scope||''],['',''],
    ['WHOLE-HOME AUDIO',''],['Platform',j.audio.platform||''],['Zones',j.audio.zones||0],['',''],
    ['OUTDOOR',''],['Landscape Audio',j.outdoor.landscapeAudio?'Yes':'No'],
    ['Landscape Zones',j.outdoor.zones||0],['Pool/Spa',j.outdoor.poolSpa?'Yes':'No'],
    ['Outdoor TV',j.outdoor.outdoorTv?'Yes':'No'],
  ];
  const ws3=XLSX.utils.aoa_to_sheet(sys); ws3['!cols']=[{wch:22},{wch:38}];
  XLSX.utils.book_append_sheet(wb,ws3,'Systems');

  // Network
  const net=[['NETWORK',''],['AP Count',j.network.apCount||0],['Switch Size',j.network.switchSize||''],['NVR',j.network.nvr?'Yes':'No'],['UPS',j.network.ups?'Yes':'No'],['Notes',j.network.notes||'']];
  const ws4=XLSX.utils.aoa_to_sheet(net); ws4['!cols']=[{wch:18},{wch:42}];
  XLSX.utils.book_append_sheet(wb,ws4,'Network');

  // Cameras
  const cam=[['CAMERAS',''],['Total',j.cameras.total||0],['Interior',j.cameras.interior||0],['Exterior',j.cameras.exterior||0],['Coverage Areas',(j.cameras.areas||[]).join(', ')],['Notes',j.cameras.notes||'']];
  const ws5=XLSX.utils.aoa_to_sheet(cam); ws5['!cols']=[{wch:18},{wch:42}];
  XLSX.utils.book_append_sheet(wb,ws5,'Cameras');

  // AI Data
  const ws6=XLSX.utils.aoa_to_sheet([['AI_DATA — paste directly to Diamond Dog'],[JSON.stringify(j,null,2)]]);
  ws6['!cols']=[{wch:120}];
  XLSX.utils.book_append_sheet(wb,ws6,'AI Data');

  XLSX.writeFile(wb,`JobWalk_${(j.client.name||'Client').replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportJSON() {
  const j=job(), b=new Blob([JSON.stringify(j,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b), a=document.createElement('a');
  a.href=u; a.download=`JobWalk_${(j.client.name||'Client').replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(u);
}

// ─── ROUTER ───
function render() {
  const app=document.getElementById('app');
  if(S.screen==='home')        app.innerHTML=renderHome();
  else if(S.screen==='picker') app.innerHTML=renderPicker();
  else if(S.screen==='room-editor') app.innerHTML=renderRoomEditor();
  else if(S.screen==='job')    app.innerHTML=renderJob();
}

hydrate(); render();
</script>
</body>
</html>
