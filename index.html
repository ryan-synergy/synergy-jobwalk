<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Job Walk">
  <title>Synergy Job Walk</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #0f172a;
      --accent: #e8561e;
      --accent-lt: #fff2ed;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --danger: #ef4444;
      --radius: 12px;
      --nav-h: 60px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    #app { max-width: 640px; margin: 0 auto; min-height: 100dvh; }

    /* ── HEADER ── */
    .hdr {
      background: var(--primary); color: #fff;
      padding: 14px 18px; padding-top: calc(14px + var(--safe-t));
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
    }
    .hdr h1 { font-size: 17px; font-weight: 700; }
    .hdr-btn { background: none; border: none; color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px; margin: -8px; font-family: inherit; }

    /* ── BOTTOM NAV ── */
    .bnav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 640px;
      background: #fff; border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-b); z-index: 200;
    }
    .bnav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 2px; border: none; background: none; color: var(--muted);
      font-size: 10px; gap: 2px; cursor: pointer; font-family: inherit;
    }
    .bnav-tab.on { color: var(--accent); }
    .bnav-tab .ni { font-size: 19px; line-height: 1; }

    /* ── CONTENT ── */
    .content { padding: 14px; padding-bottom: calc(var(--nav-h) + var(--safe-b) + 14px); }

    /* ── CARD ── */
    .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
    .card-ttl { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }

    /* ── FIELDS ── */
    .f { margin-bottom: 16px; }
    .f:last-child { margin-bottom: 0; }
    .f label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 7px; }
    .f input[type=text], .f input[type=number], .f textarea, .f select {
      width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 16px; font-family: inherit; color: var(--text); background: #fff;
      -webkit-appearance: none; transition: border-color .15s;
    }
    .f input:focus, .f textarea:focus { outline: none; border-color: var(--accent); }
    .f textarea { resize: none; height: 76px; line-height: 1.4; }
    .f .row2 { display: flex; gap: 8px; }
    .f .row2 input { flex: 1; }

    /* ── CHIPS ── */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      padding: 8px 13px; border-radius: 20px; border: 1.5px solid var(--border);
      background: #fff; font-size: 14px; color: var(--text); cursor: pointer;
      font-family: inherit; white-space: nowrap; transition: all .12s; line-height: 1;
    }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* ── COUNTER ── */
    .ctr { display: flex; align-items: stretch; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; }
    .ctr button { width: 46px; border: none; background: #f8fafc; font-size: 22px; font-weight: 700; color: var(--accent); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; }
    .ctr button:active { background: var(--accent-lt); }
    .ctr input { width: 58px; text-align: center; border: none; border-left: 1.5px solid var(--border); border-right: 1.5px solid var(--border); font-size: 18px; font-weight: 700; color: var(--text); padding: 10px 0; font-family: inherit; }
    .ctr input:focus { outline: none; }

    /* ── TOGGLE ── */
    .tog-row { display: flex; align-items: center; justify-content: space-between; min-height: 44px; }
    .tog-lbl { font-size: 15px; font-weight: 500; }
    .tog { width: 48px; height: 28px; background: #cbd5e1; border-radius: 14px; position: relative; cursor: pointer; border: none; transition: background .2s; flex-shrink: 0; }
    .tog.on { background: var(--accent); }
    .tog::after { content: ''; width: 22px; height: 22px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .tog.on::after { transform: translateX(20px); }

    /* ── ROOM LIST ── */
    .room-row {
      background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 13px 15px; margin-bottom: 9px;
      display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .room-row:active { border-color: var(--accent); }
    .room-row-name { font-size: 16px; font-weight: 600; }
    .room-row-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .room-del { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 8px; margin: -8px -8px -8px 4px; }

    .add-btn {
      width: 100%; padding: 15px; border: 2px dashed var(--accent);
      border-radius: 10px; background: var(--accent-lt); color: var(--accent);
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px;
    }

    /* ── HOME ── */
    .home-top { background: var(--primary); padding: 36px 22px 28px; padding-top: calc(36px + var(--safe-t)); }
    .home-logo { font-size: 26px; font-weight: 800; color: #fff; }
    .home-logo span { color: var(--accent); }
    .home-sub { color: #94a3b8; font-size: 13px; margin-top: 3px; }
    .home-content { padding: 18px 14px; }

    .new-btn { width: 100%; padding: 17px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 22px; }

    .job-row { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 9px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .job-row:active { border-color: var(--accent); }
    .job-name { font-size: 16px; font-weight: 700; }
    .job-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .job-del { background: none; border: none; color: var(--danger); font-size: 20px; cursor: pointer; padding: 8px; margin: -8px; }

    .sec-lbl { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: 6px 0 8px; }

    /* ── ROOM PICKER ── */
    .rt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
    .rt-btn { padding: 15px 6px; border: 2px solid var(--border); border-radius: 10px; background: #fff; text-align: center; cursor: pointer; font-family: inherit; transition: all .12s; }
    .rt-btn:active { border-color: var(--accent); background: var(--accent-lt); }
    .rt-icon { font-size: 26px; display: block; }
    .rt-lbl { font-size: 11px; font-weight: 600; color: var(--text); display: block; margin-top: 5px; }

    /* ── EXPORT ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin-bottom: 14px; }
    .stat { background: var(--accent-lt); border-radius: 10px; padding: 13px 8px; text-align: center; }
    .stat-n { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-l { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 3px; }
    .exp-btn { width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; margin-bottom: 9px; display: flex; align-items: center; justify-content: center; gap: 9px; }
    .exp-xl { background: #16a34a; color: #fff; }
    .exp-js { background: #2563eb; color: #fff; }

    /* ── MISC ── */
    .div { height: 1px; background: var(--border); margin: 14px 0; }
    .del-row { display: flex; justify-content: center; padding: 6px 0 10px; }
    .del-lnk { background: none; border: none; color: var(--danger); font-size: 14px; cursor: pointer; padding: 8px; font-family: inherit; }
    .empty { text-align: center; padding: 44px 20px; }
    .empty-ic { font-size: 46px; }
    .empty-tx { font-size: 15px; color: var(--muted); margin-top: 10px; }
    .screen { animation: fi .18s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
//  STATE & STORAGE
// ═══════════════════════════════════════════
const SK = 'syng_jw_v1';
let S = { screen:'home', tab:'client', jobs:[], jid:null, rid:null, room:null };

function persist() {
  localStorage.setItem(SK, JSON.stringify({ jobs:S.jobs, jid:S.jid }));
}
function hydrate() {
  try { const d=JSON.parse(localStorage.getItem(SK)||'{}'); if(d.jobs) S.jobs=d.jobs; if(d.jid) S.jid=d.jid; } catch(e){}
}
function uid() { return (crypto.randomUUID?.() || Math.random().toString(36).slice(2)+Date.now().toString(36)); }
function job() { return S.jobs.find(j=>j.id===S.jid); }

function mkJob() {
  return {
    id:uid(), createdAt:new Date().toISOString(),
    client:{ name:'',address:'',decisionMaker:'',gcName:'',designer:'',jobType:'',phase:'',budgetTier:'' },
    home:{ sqft:'',stories:'',construction:'' },
    setup:{ rackLocation:'',networkCloset:'',notes:'' },
    rooms:[],
    control:{ processor:'',subsystems:[] },
    lighting:{ brand:'',scope:'' },
    audio:{ platform:'',zones:0 },
    network:{ apCount:0,switchSize:'',nvr:false,ups:false,notes:'' },
    cameras:{ total:0,interior:0,exterior:0,areas:[],notes:'' },
    outdoor:{ landscapeAudio:false,zones:0,poolSpa:false,outdoorTv:false }
  };
}
function mkRoom(name, custom) {
  return {
    id:uid(), name, customName:custom||'',
    avType:'',
    tv:{ size:'',customSize:'',wallW:'',wallH:'',mountType:'' },
    audio:{ type:'',surroundConfig:'' },
    theater:{ displayType:'',screenType:'',blackoutShades:false },
    gearLocation:'', sourceDevice:'',
    c4Remote:null, lightingKeypad:null, motorizedShades:'',
    ceilingHeight:'', dataDrops:null, notes:''
  };
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function go(screen, tab) { S.screen=screen; if(tab) S.tab=tab; render(); window.scrollTo(0,0); }
function tab(t) { S.tab=t; render(); window.scrollTo(0,0); }

// ═══════════════════════════════════════════
//  GENERIC INPUT HANDLERS
// ═══════════════════════════════════════════
function setPath(obj, path, val) {
  const parts=path.split('.'); let o=obj;
  for(let i=0;i<parts.length-1;i++) o=o[parts[i]];
  o[parts[parts.length-1]]=val;
}
function getPath(obj, path) {
  return path.split('.').reduce((o,k)=>o?.[k], obj);
}

// Job-level inputs
function jInput(el, path) { setPath(job(), path, el.value); persist(); }
function jChip(el, path, multi) {
  const v=el.dataset.value, j=job(), cur=getPath(j,path);
  if(multi) {
    const arr=cur||[]; const idx=arr.indexOf(v);
    idx>=0 ? arr.splice(idx,1) : arr.push(v);
    setPath(j,path,arr);
  } else { setPath(j,path,cur===v?'':v); }
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>{
    const cv=c.dataset.value, nv=getPath(j,path);
    c.classList.toggle('on', multi ? (nv||[]).includes(cv) : nv===cv);
  });
  persist();
  // Re-render outdoor section if landscape audio toggled via chip
  if(path==='outdoor.landscapeAudio') render();
}
function jToggle(el, path) {
  el.classList.toggle('on');
  setPath(job(), path, el.classList.contains('on'));
  persist();
  if(path.startsWith('outdoor.')) render();
}
function jCtr(el, path, d) {
  const j=job(), cur=getPath(j,path)||0, nv=Math.max(0,cur+d);
  setPath(j,path,nv);
  // Update the input next to this button
  const inp = d>0 ? el.previousElementSibling : el.nextElementSibling;
  if(inp && inp.tagName==='INPUT') inp.value=nv;
  persist();
}
function jCtrSet(el, path) {
  setPath(job(), path, Math.max(0, parseInt(el.value)||0));
  persist();
}

// Room-level inputs
function rInput(el, path) { setPath(S.room, path, el.value); }
function rChip(el, path, multi) {
  const v=el.dataset.value, r=S.room, cur=getPath(r,path);
  if(multi) {
    const arr=cur||[]; const idx=arr.indexOf(v);
    idx>=0 ? arr.splice(idx,1) : arr.push(v);
    setPath(r,path,arr);
  } else { setPath(r,path,cur===v?'':v); }
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>{
    const cv=c.dataset.value, nv=getPath(r,path);
    c.classList.toggle('on', multi ? (nv||[]).includes(cv) : nv===cv);
  });
  // avType change = re-render to show/hide sections
  if(path==='avType') { S.room.tv.present=['tv_only','tv_stereo','tv_surround'].includes(v); render(); }
}
function rBool(el, field) {
  const v=el.dataset.value==='true'; S.room[field]=v;
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.value===String(v)));
}
function rToggle(el, path) { el.classList.toggle('on'); setPath(S.room,path,el.classList.contains('on')); }

// ═══════════════════════════════════════════
//  CHIP / COUNTER HELPERS (render)
// ═══════════════════════════════════════════
function jChips(opts, path, multi=false) {
  const val=getPath(job(),path);
  return `<div class="chips">${opts.map(o=>`<button class="chip ${multi?(val||[]).includes(o.v)?'on':'':val===o.v?'on':''}" data-value="${o.v}" onclick="jChip(this,'${path}',${multi})">${o.l}</button>`).join('')}</div>`;
}
function rChips(opts, path, multi=false) {
  const val=getPath(S.room,path);
  return `<div class="chips">${opts.map(o=>`<button class="chip ${multi?(val||[]).includes(o.v)?'on':'':val===o.v?'on':''}" data-value="${o.v}" onclick="rChip(this,'${path}',${multi})">${o.l}</button>`).join('')}</div>`;
}
function rBoolChips(field) {
  const v=S.room[field];
  return `<div class="chips">
    <button class="chip ${v===true?'on':''}" data-value="true" onclick="rBool(this,'${field}')">Yes</button>
    <button class="chip ${v===false?'on':''}" data-value="false" onclick="rBool(this,'${field}')">No</button>
  </div>`;
}
function jCtrEl(path) {
  const v=getPath(job(),path)||0;
  return `<div class="ctr">
    <button onclick="jCtr(this,'${path}',-1)">−</button>
    <input type="number" value="${v}" min="0" onchange="jCtrSet(this,'${path}')" oninput="jCtrSet(this,'${path}')">
    <button onclick="jCtr(this,'${path}',1)">+</button>
  </div>`;
}
function jTogEl(path, label) {
  const v=getPath(job(),path);
  return `<div class="tog-row"><span class="tog-lbl">${label}</span><button class="tog ${v?'on':''}" onclick="jToggle(this,'${path}')"></button></div>`;
}

// ═══════════════════════════════════════════
//  HOME SCREEN
// ═══════════════════════════════════════════
function renderHome() {
  const jobs=[...S.jobs].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return `<div class="screen">
    <div class="home-top">
      <div class="home-logo">Synergy<span> AV</span></div>
      <div class="home-sub">Job Walk</div>
    </div>
    <div class="home-content">
      <button class="new-btn" onclick="newJob()">+ New Job Walk</button>
      ${jobs.length===0 ? `<div class="empty"><div class="empty-ic">🏠</div><div class="empty-tx">No walks yet. Tap above to start.</div></div>` :
        `<div class="sec-lbl">Recent Walks</div>
        ${jobs.map(j=>`
          <div class="job-row" onclick="openJob('${j.id}')">
            <div>
              <div class="job-name">${j.client.name||'Unnamed Client'}</div>
              <div class="job-meta">${j.client.address||'No address'} · ${new Date(j.createdAt).toLocaleDateString()}</div>
            </div>
            <button class="job-del" onclick="event.stopPropagation();delJob('${j.id}')">🗑</button>
          </div>
        `).join('')}`
      }
    </div>
  </div>`;
}

function newJob() {
  const j=mkJob(); S.jobs.push(j); S.jid=j.id; persist(); go('job','client');
}
function openJob(id) { S.jid=id; go('job','client'); }
function delJob(id) {
  if(!confirm('Delete this job walk?')) return;
  S.jobs=S.jobs.filter(j=>j.id!==id); if(S.jid===id) S.jid=null; persist(); render();
}

// ═══════════════════════════════════════════
//  JOB SCREEN
// ═══════════════════════════════════════════
const TABS=[
  {id:'client',ic:'👤',lbl:'Client'},
  {id:'rooms',ic:'🚪',lbl:'Rooms'},
  {id:'systems',ic:'🎛',lbl:'Systems'},
  {id:'network',ic:'📡',lbl:'Network'},
  {id:'cameras',ic:'📷',lbl:'Cameras'},
  {id:'export',ic:'📤',lbl:'Export'},
];
function renderJob() {
  const j=job(); if(!j){go('home');return '';}
  const tabs=TABS.map(t=>`<button class="bnav-tab ${S.tab===t.id?'on':''}" onclick="tab('${t.id}')"><span class="ni">${t.ic}</span><span>${t.lbl}</span></button>`).join('');
  let body='';
  if(S.tab==='client') body=renderClient(j);
  else if(S.tab==='rooms') body=renderRooms(j);
  else if(S.tab==='systems') body=renderSystems(j);
  else if(S.tab==='network') body=renderNetwork(j);
  else if(S.tab==='cameras') body=renderCameras(j);
  else if(S.tab==='export') body=renderExport(j);
  return `<div class="screen">
    <div class="hdr">
      <button class="hdr-btn" onclick="go('home')">← Jobs</button>
      <h1>${j.client.name||'New Job Walk'}</h1>
      <span></span>
    </div>
    <div class="content">${body}</div>
    <div class="bnav">${tabs}</div>
  </div>`;
}

// ── CLIENT TAB ──
function renderClient(j) {
  const c=j.client, h=j.home, s=j.setup;
  return `
  <div class="card">
    <div class="card-ttl">Client Info</div>
    <div class="f"><label>Client Name</label><input type="text" value="${c.name}" placeholder="Last, First" oninput="jInput(this,'client.name')"></div>
    <div class="f"><label>Address</label><input type="text" value="${c.address}" placeholder="123 Main St, Newport Beach" oninput="jInput(this,'client.address')"></div>
    <div class="f"><label>Decision Maker</label><input type="text" value="${c.decisionMaker}" placeholder="Who makes the call on site?" oninput="jInput(this,'client.decisionMaker')"></div>
    <div class="f"><label>GC / Builder</label><input type="text" value="${c.gcName}" placeholder="General Contractor" oninput="jInput(this,'client.gcName')"></div>
    <div class="f"><label>Architect / Designer</label><input type="text" value="${c.designer}" placeholder="Optional" oninput="jInput(this,'client.designer')"></div>
  </div>
  <div class="card">
    <div class="card-ttl">Job Type</div>
    <div class="f"><label>Project Type</label>${jChips([{l:'New Build',v:'new_build'},{l:'Retrofit',v:'retrofit'},{l:'Prewire Only',v:'prewire'},{l:'Service',v:'service'}],'client.jobType')}</div>
    <div class="f"><label>Phase</label>${jChips([{l:'Prewire',v:'prewire'},{l:'Trim Out',v:'trim'},{l:'Full Install',v:'full'},{l:'All Phases',v:'all'}],'client.phase')}</div>
    <div class="f"><label>Budget Tier</label>${jChips([{l:'Entry',v:'entry'},{l:'Mid',v:'mid'},{l:'High',v:'high'},{l:'Ultra',v:'ultra'}],'client.budgetTier')}</div>
  </div>
  <div class="card">
    <div class="card-ttl">Home Details</div>
    <div class="f"><label>Approx. Sq Footage</label><input type="number" value="${h.sqft}" placeholder="e.g. 4500" oninput="jInput(this,'home.sqft')"></div>
    <div class="f"><label>Stories</label>${jChips([{l:'1',v:'1'},{l:'2',v:'2'},{l:'3',v:'3'},{l:'3+',v:'3+'}],'home.stories')}</div>
    <div class="f"><label>Construction</label>${jChips([{l:'Wood Frame',v:'wood'},{l:'Concrete',v:'concrete'},{l:'Steel',v:'steel'},{l:'Mixed',v:'mixed'}],'home.construction')}</div>
  </div>
  <div class="card">
    <div class="card-ttl">Walk Setup</div>
    <div class="f"><label>AV Rack Location</label><input type="text" value="${s.rackLocation}" placeholder="e.g. Hallway closet, 2nd floor" oninput="jInput(this,'setup.rackLocation')"></div>
    <div class="f"><label>Network Closet</label><input type="text" value="${s.networkCloset}" placeholder="e.g. Same as rack / Garage" oninput="jInput(this,'setup.networkCloset')"></div>
    <div class="f"><label>Walk Notes</label><textarea placeholder="General notes..." oninput="jInput(this,'setup.notes')">${s.notes}</textarea></div>

function saveRoom() {
  const j=job(), idx=j.rooms.findIndex(r=>r.id===S.rid);

function exportJSON() {

  a.click(); URL.revokeObjectURL(url);
}

  else if(S.screen==='picker') app.innerHTML=renderPicker();
  else if(S.screen==='room-editor') app.innerHTML=renderRoomEditor();
  else if(S.screen==='job') app.innerHTML=renderJob();
}

// ── INIT ──
hydrate(); render();
</script>
</body>
